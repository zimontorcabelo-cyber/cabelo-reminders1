<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CABELO – תזכורות חי</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: #252525;
    --gold: #c9a96e;
    --gold-light: #e8c98a;
    --gold-dim: rgba(201,169,110,0.12);
    --green: #1a6b3a;
    --green-bright: #27ae60;
    --text: #f0ece4;
    --text-muted: #777;
    --text-dim: #444;
    --radius: 14px;
    --red: #c0392b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 7px;
    color: var(--gold);
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
  }
  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green-bright);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; }
    50% { opacity:.4; }
  }
  .btn-refresh {
    background: var(--gold-dim);
    border: 1px solid rgba(201,169,110,0.3);
    color: var(--gold);
    border-radius: 8px;
    padding: 7px 16px;
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-refresh:hover { background: rgba(201,169,110,0.2); }
  .btn-refresh.spinning svg { animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* DATE NAV */
  .date-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex;
    align-items: center;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .date-nav::-webkit-scrollbar { display: none; }
  .date-tab {
    padding: 14px 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    border-bottom: 2px solid transparent;
    transition: all .2s;
    white-space: nowrap;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .date-tab .day-name { font-size: 11px; color: var(--text-dim); }
  .date-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .date-tab.active .day-name { color: var(--gold); opacity: .7; }
  .date-tab .count-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0;
    margin-top: 2px;
  }
  .date-tab.has-events .count-dot { opacity: 1; }
  .date-picker-wrap {
    margin-right: auto;
    padding-right: 12px;
  }
  .date-picker-wrap input[type=date] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 12px;
    outline: none;
    cursor: pointer;
  }

  /* STATS */
  .stats-bar {
    padding: 12px 28px;
    display: flex;
    gap: 24px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .stat {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .stat strong { color: var(--text); font-weight: 700; }

  /* SEARCH */
  .search-bar {
    padding: 16px 28px 8px;
  }
  .search-wrap {
    position: relative;
    max-width: 340px;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px 9px 38px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border .2s;
  }
  .search-wrap input:focus { border-color: var(--gold); }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    pointer-events: none;
  }

  /* GRID */
  .grid-wrap { padding: 12px 28px 40px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 14px;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    transition: border-color .2s, transform .15s;
    animation: fadeUp .25s ease both;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 3px;
    height: 100%;
    background: var(--gold);
    opacity: 0;
    transition: opacity .2s;
  }
  .card:hover { border-color: #333; transform: translateY(-2px); }
  .card:hover::before { opacity: 1; }
  .card.done { opacity: .38; pointer-events: none; }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(12px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .card-time {
    font-size: 22px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: -0.5px;
    margin-bottom: 6px;
    line-height: 1;
  }
  .card-name {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .badge {
    font-size: 10px;
    font-weight: 600;
    background: var(--surface2);
    border-radius: 20px;
    padding: 2px 8px;
    color: var(--text-muted);
  }
  .badge.first { background: rgba(201,169,110,0.15); color: var(--gold); }
  .card-phone {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 12px;
    direction: ltr;
    text-align: right;
  }
  .card-actions {
    display: flex;
    gap: 8px;
  }
  .btn-wa {
    flex: 1;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px 12px;
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background .2s;
    text-decoration: none;
  }
  .btn-wa:hover { background: var(--green-bright); }
  .btn-check {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 8px;
    padding: 9px 13px;
    cursor: pointer;
    font-size: 14px;
    transition: all .2s;
    font-family: 'Heebo', sans-serif;
  }
  .btn-check:hover { border-color: var(--green-bright); color: var(--green-bright); }

  /* EMPTY / LOADING */
  .empty {
    text-align: center;
    color: var(--text-muted);
    padding: 60px 0;
    font-size: 14px;
    grid-column: 1/-1;
  }
  .empty .icon { font-size: 36px; margin-bottom: 10px; }
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  .loading-text { font-size: 14px; color: var(--text-muted); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    z-index: 300;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 26px;
    width: min(480px, 92vw);
    position: relative;
  }
  .modal-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 6px;
  }
  .modal-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 14px;
  }
  .modal textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    resize: vertical;
    min-height: 110px;
    outline: none;
    direction: rtl;
    line-height: 1.6;
  }
  .modal textarea:focus { border-color: var(--gold); }
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }
  .btn-send {
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 22px;
    font-family: 'Heebo', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 7px;
    transition: background .2s;
  }
  .btn-send:hover { background: var(--green-bright); }
  .btn-cancel {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 8px;
    padding: 10px 18px;
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    cursor: pointer;
  }
  .modal-close {
    position: absolute;
    top: 16px; left: 16px;
    background: none; border: none;
    color: var(--text-muted);
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
    padding: 0 4px;
  }
  .last-updated {
    font-size: 11px;
    color: var(--text-dim);
  }
  /* MODE TABS */
  .mode-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex;
    gap: 4px;
  }
  .mode-tab {
    padding: 12px 18px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    border-bottom: 2px solid transparent;
    transition: all .2s;
  }
  .mode-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .snapshot-badge {
    font-size: 11px;
    color: var(--text-dim);
    padding: 8px 28px 0;
  }

  /* INACTIVE TABLE */
  .inactive-wrap { padding: 16px 28px 40px; }
  .inactive-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .inactive-table th {
    text-align: right;
    color: var(--text-muted);
    font-weight: 600;
    font-size: 12px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  .inactive-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .inactive-table tr.done { opacity: .35; }
  .days-badge {
    font-size: 11px;
    font-weight: 700;
    border-radius: 20px;
    padding: 3px 10px;
    display: inline-block;
  }
  .days-badge.urgent { background: rgba(192,57,43,0.18); color: #e07a6e; }
  .days-badge.warm { background: rgba(201,169,110,0.15); color: var(--gold); }
  .inactive-table .phone-col { direction: ltr; text-align: right; color: var(--text-dim); }
  .btn-wa-small {
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    font-family: 'Heebo', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .btn-wa-small:hover { background: var(--green-bright); }
  .btn-check-small {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 6px;
    padding: 6px 9px;
    cursor: pointer;
    font-size: 13px;
    margin-right: 6px;
  }

</style>
</head>
<body>

<div class="header">
  <div class="logo">CABELO</div>
  <div class="header-right">
    <span class="last-updated">תמונת מצב מ-<span id="lastUpdated">—</span></span>
  </div>
</div>

<div class="mode-nav">
  <div class="mode-tab active" id="tabUpcoming" onclick="switchMode('upcoming')">📅 תורים קרובים</div>
  <div class="mode-tab" id="tabInactive" onclick="switchMode('inactive')">💤 לקוחות לא פעילים</div>
</div>
<div class="snapshot-badge">⚠️ נתונים סטטיים — תמונת מצב מהרגע שהקובץ נוצר. לעדכון, שלח קובץ לקוחות/פגישות חדש מ-EasyBizy.</div>

</div>

<!-- INACTIVE SECTION -->
<div id="sectionInactive" style="display:none">
  <div class="search-bar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="inactiveSearch" placeholder="חיפוש לקוח / טלפון..." oninput="renderInactive()">
    </div>
  </div>
  <div class="inactive-wrap">
    <table class="inactive-table">
      <thead>
        <tr>
          <th>שם</th>
          <th>טלפון</th>
          <th>ביקור אחרון</th>
          <th>סה״כ טיפולים</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="inactiveBody"></tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-sub" id="modalSub"></div>
    <textarea id="modalMsg"></textarea>
    <div class="modal-actions">
      <a id="btnSendWA" href="#" target="_blank" class="btn-send" onclick="closeModal()">
        📱 שלח WhatsApp
      </a>
      <button class="btn-cancel" onclick="closeModal()">ביטול</button>
    </div>
  </div>
</div>

// ─── State ────────────────────────────────────────────
let mode = 'upcoming';
let allEvents = [];
let dateMap = {};
let activeDates = [];
let selectedDate = '';
const done = new Set();
const inactiveDone = new Set();

const DAYS_HE = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];

function esc(s) {
  return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

// ─── Mode switching ───────────────────────────────────
function switchMode(m) {
  mode = m;
  document.getElementById('tabUpcoming').classList.toggle('active', m === 'upcoming');
  document.getElementById('tabInactive').classList.toggle('active', m === 'inactive');
  document.getElementById('sectionUpcoming').style.display = m === 'upcoming' ? '' : 'none';
  document.getElementById('sectionInactive').style.display = m === 'inactive' ? '' : 'none';
  if (m === 'inactive') renderInactive();
}

// ─── Upcoming: load from embedded static data ─────────
function todayKey() {
  const d = new Date();
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

function loadUpcoming() {
  allEvents = UPCOMING_DATA.map(ev => {
    const startD = new Date(ev.startsAt);
    const day = String(startD.getDate()).padStart(2,'0');
    const mon = String(startD.getMonth()+1).padStart(2,'0');
    const yr = startD.getFullYear();
    const dateKey = `${day}/${mon}/${yr}`;
    const timeStr = startD.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit', timeZone:'Asia/Jerusalem'});
    return {
      id: ev.id,
      name: ev.name,
      phone: ev.phone,
      service: ev.service,
      dateKey,
      timeStr,
      dayName: DAYS_HE[startD.getDay()],
      sortKey: startD.getTime(),
    };
  }).sort((a,b) => a.sortKey - b.sortKey);

  dateMap = {};
  for (const ev of allEvents) {
    if (!dateMap[ev.dateKey]) dateMap[ev.dateKey] = [];
    dateMap[ev.dateKey].push(ev);
  }
  activeDates = Object.keys(dateMap).sort((a,b) => {
    const [da,ma,ya] = a.split('/');
    const [db,mb,yb] = b.split('/');
    return new Date(ya,ma-1,da) - new Date(yb,mb-1,db);
  });

  buildDateTabs();
  const today = todayKey();
  selectedDate = activeDates.includes(today) ? today : (activeDates[0] || '');
  updateActiveTab();
  renderStats();
  renderCards();
  document.getElementById('lastUpdated').textContent = GENERATED_AT;
}

function buildDateTabs() {
  const nav = document.getElementById('dateNav');
  const picker = nav.querySelector('.date-picker-wrap');
  nav.innerHTML = '';
  nav.appendChild(picker);
  for (const dk of activeDates) {
    const [d,m,y] = dk.split('/');
    const dt = new Date(y, m-1, d);
    const dayName = DAYS_HE[dt.getDay()];
    const tab = document.createElement('div');
    tab.className = 'date-tab has-events';
    tab.dataset.date = dk;
    tab.innerHTML = `<span class="day-name">${dayName}</span><span>${d}/${m}</span><div class="count-dot"></div>`;
    tab.onclick = () => selectDate(dk);
    nav.insertBefore(tab, picker);
  }
}

function selectDate(dk) {
  selectedDate = dk;
  updateActiveTab();
  renderCards();
  renderStats();
}

function updateActiveTab() {
  document.querySelectorAll('.date-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.date === selectedDate);
  });
  if (selectedDate) {
    const [d,m,y] = selectedDate.split('/');
    document.getElementById('customDate').value = `${y}-${m}-${d}`;
  }
}

function onCustomDate(val) {
  if (!val) return;
  const [y,m,d] = val.split('-');
  const dk = `${d}/${m}/${y}`;
  if (activeDates.includes(dk)) {
    selectDate(dk);
  } else {
    selectedDate = dk;
    renderCards();
    renderStats();
  }
}

function renderStats() {
  const bar = document.getElementById('statsBar');
  const dayEvents = dateMap[selectedDate] || [];
  const total = allEvents.length;
  const todayCount = (dateMap[todayKey()] || []).length;
  const [d,m,y] = (selectedDate || todayKey()).split('/');
  const dt = new Date(y,m-1,d);
  const dayName = DAYS_HE[dt.getDay()];
  bar.style.display = 'flex';
  bar.innerHTML = `
    <div class="stat">📅 <strong>${dayName} ${d}/${m}</strong></div>
    <div class="stat">👥 <strong>${dayEvents.length}</strong> תורים ביום זה</div>
    <div class="stat">📆 <strong>${todayCount}</strong> תורים היום</div>
    <div class="stat">🗓️ <strong>${total}</strong> תורים בחלון שנשלף</div>
  `;
}

function buildWAUrl(phone) {
  if (!phone) return '';
  const digits = phone.replace(/\D/g,'');
  const intl = digits.startsWith('972') ? digits : `972${digits.replace(/^0/,'')}`;
  return `https://wa.me/${intl}`;
}

function buildWAMessage(ev) {
  return `שלום ${ev.name} 😊\n\nרצינו להזכיר לך שיש לך תור ב-CABELO\nתאריך: ${ev.dateKey}\nשעה: ${ev.timeStr}\nטיפול: ${ev.service}\n\nנשמח לראות אותך! 🌟\n– צוות CABELO`;
}

function renderCards() {
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  let events = dateMap[selectedDate] || [];
  if (search) {
    events = events.filter(e => e.name.toLowerCase().includes(search) || e.phone.includes(search));
  }
  const grid = document.getElementById('cardsGrid');
  if (events.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="icon">📭</div>${search ? 'לא נמצאו תוצאות' : 'אין תורים ביום זה'}</div>`;
    return;
  }
  grid.innerHTML = events.map((ev, i) => {
    const isDone = done.has(ev.id);
    const waUrl = buildWAUrl(ev.phone);
    return `<div class="card${isDone?' done':''}" style="animation-delay:${i*0.04}s" id="card-${ev.id}">
      <div class="card-time">${ev.timeStr}</div>
      <div class="card-name">${ev.name} <span class="badge">${ev.service}</span></div>
      <div class="card-phone">${ev.phone || '—'}</div>
      <div class="card-actions">
        ${waUrl
          ? `<button class="btn-wa" onclick="openModal('${esc(ev.id)}','${esc(ev.name)}','${esc(ev.phone)}','${esc(waUrl)}','${esc(ev.timeStr)}','${esc(ev.dateKey)}','${esc(ev.service)}')">📱 שלח תזכורת</button>`
          : `<button class="btn-wa" style="opacity:.4;cursor:default">אין טלפון</button>`}
        <button class="btn-check" onclick="markDone('${ev.id}',this)" title="סמן כנשלח">✓</button>
      </div>
    </div>`;
  }).join('');
}

function markDone(id, btn) {
  done.add(id);
  btn.closest('.card').classList.add('done');
}

// ─── Inactive customers ────────────────────────────────
function buildInactiveMessage(name) {
  return `הי ${name}, הקיץ כבר כאן וזה הזמן לתאם טיפול המשך 🌞\nמצ"ב קישור לתיאום תור: https://laser-style.queuely.co.il\nצוות CABELO`;
}

function daysBadgeClass(days) {
  return days >= 90 ? 'urgent' : 'warm';
}

function formatDateHe(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('he-IL', {timeZone:'Asia/Jerusalem', day:'2-digit', month:'2-digit', year:'numeric'});
}

function renderInactive() {
  const search = document.getElementById('inactiveSearch').value.trim().toLowerCase();
  let rows = INACTIVE_DATA;
  if (search) {
    rows = rows.filter(c => c.name.toLowerCase().includes(search) || c.phone.includes(search));
  }
  const body = document.getElementById('inactiveBody');
  if (rows.length === 0) {
    body.innerHTML = `<tr><td colspan="5" class="empty">לא נמצאו תוצאות</td></tr>`;
    return;
  }
  body.innerHTML = rows.map(c => {
    const isDone = inactiveDone.has(c.id);
    const waUrl = buildWAUrl(c.phone);
    const msg = buildInactiveMessage(c.name);
    const href = waUrl ? `${waUrl}?text=${encodeURIComponent(msg)}` : '';
    return `<tr class="${isDone?'done':''}" id="inactive-${c.id}">
      <td>${c.name}</td>
      <td class="phone-col">${c.phone || '—'}</td>
      <td><span class="days-badge ${daysBadgeClass(c.daysInactive)}">${c.daysInactive} ימים</span> ${formatDateHe(c.lastVisit)}</td>
      <td>${c.totalTreatments}</td>
      <td>
        ${href ? `<a href="${href}" target="_blank" class="btn-wa-small">📱 שלח</a>` : '<span style="opacity:.4">אין טלפון</span>'}
        <button class="btn-check-small" onclick="markInactiveDone('${c.id}')" title="סמן כנשלח">✓</button>
      </td>
    </tr>`;
  }).join('');
}

function markInactiveDone(id) {
  inactiveDone.add(id);
  const row = document.getElementById('inactive-' + id);
  if (row) row.classList.add('done');
}

// ─── Modal (shared) ────────────────────────────────────
let _modalWaBase = '';
function openModal(id, name, phone, waUrl, time, dateKey, service) {
  const msg = `שלום ${name} 😊\n\nרצינו להזכיר לך שיש לך תור ב-CABELO\nתאריך: ${dateKey}\nשעה: ${time}\nטיפול: ${service}\n\nנשמח לראות אותך! 🌟\n– צוות CABELO`;
  document.getElementById('modalTitle').textContent = `תזכורת ל-${name}`;
  document.getElementById('modalSub').textContent = `${dateKey}  ·  ${time}  ·  ${phone}`;
  document.getElementById('modalMsg').value = msg;
  _modalWaBase = waUrl || '';
  updateModalLink();
  document.getElementById('modal').classList.add('open');
}
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('modalMsg').addEventListener('input', updateModalLink);
});
function updateModalLink() {
  const msg = document.getElementById('modalMsg').value;
  document.getElementById('btnSendWA').href = _modalWaBase + '?text=' + encodeURIComponent(msg);
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ─── Init ──────────────────────────────────────────────
loadUpcoming();
</script>
</body>
</html>
